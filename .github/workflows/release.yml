name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # macOS desktop app (Wails) — needs macOS runner for CGO + native frameworks
  build-macos:
    name: Build macOS ${{ matrix.goarch }}
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
          - goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Wails app
        run: |
          VERSION="${GITHUB_REF_NAME}"
          wails build -skipbindings -ldflags "-X main.version=${VERSION}" -platform darwin/${{ matrix.goarch }}

      - name: Package archive
        id: package
        run: |
          VERSION="${GITHUB_REF_NAME}"
          NAME="ditto_${VERSION}_darwin_${{ matrix.goarch }}"

          mkdir -p "dist/${NAME}"
          cp -R build/bin/Ditto.app "dist/${NAME}/Ditto.app"
          cp README.md ROADMAP.md "dist/${NAME}/"

          cd dist && zip -r "${NAME}.zip" "${NAME}"
          echo "asset=dist/${NAME}.zip" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: darwin-${{ matrix.goarch }}
          path: ${{ steps.package.outputs.asset }}
          retention-days: 1

  # Linux + Windows headless builds — standard cross-compilation on ubuntu
  build-headless:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION="${GITHUB_REF_NAME}"
          OUTPUT="ditto"
          if [ "$GOOS" = "windows" ]; then
            OUTPUT="ditto.exe"
          fi
          go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" -o "${OUTPUT}" .

      - name: Package archive
        id: package
        run: |
          VERSION="${GITHUB_REF_NAME}"
          NAME="ditto_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}"

          mkdir -p "dist/${NAME}/mocks"
          cp README.md ROADMAP.md "dist/${NAME}/"
          cp mocks/example.json "dist/${NAME}/mocks/"

          if [ "${{ matrix.goos }}" = "windows" ]; then
            cp ditto.exe "dist/${NAME}/"
            cd dist && zip -r "${NAME}.zip" "${NAME}"
            echo "asset=dist/${NAME}.zip" >> "$GITHUB_OUTPUT"
          else
            cp ditto "dist/${NAME}/"
            cd dist && tar -czf "${NAME}.tar.gz" "${NAME}"
            echo "asset=dist/${NAME}.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ steps.package.outputs.asset }}
          retention-days: 1

  release:
    name: Publish release
    needs: [build-macos, build-headless]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: false
